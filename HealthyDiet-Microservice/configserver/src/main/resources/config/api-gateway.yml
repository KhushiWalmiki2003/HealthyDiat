spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**

            - id: activity-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/activities/**

            - id: aiservice
              uri: http://localhost:8083
              predicates:
                - Path=/api/recommendations/**

server:
  port: 8080

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/