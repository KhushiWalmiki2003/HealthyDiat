spring:
  application:
    name: activity-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/Activity-HealthyDiet
    rabbitmq:
      host: localhost
      port: 5672
      username: guest
      password: guest


server:
  port: 8082

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

rabbitmq:
  exchange:
    name: HealthyDiet.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking