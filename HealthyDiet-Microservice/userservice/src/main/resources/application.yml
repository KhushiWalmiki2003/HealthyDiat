spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/HealthyDiet_user_db
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8081

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

